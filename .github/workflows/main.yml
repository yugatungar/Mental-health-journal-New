name: Full Stack CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        # Points to Backend to resolve your previous 'lock file not found' error
        cache-dependency-path: './Backend/package-lock.json'

    # 1. Build & Test Backend (Fulfills Task 3: Testing)
    - name: Backend Build & Test
      run: |
        cd Backend
        npm install
        # Executes your Naive Bayes tests and shows the detailed report
        npm test -- --verbose

    # 2. Build Frontend
    - name: Frontend Build
      run: |
        cd frontend
        npm install
        npm run build --if-present

    # 3. Docker Build (Fulfills Task 4: Containerization)
    - name: Docker Image Build Check
      run: |
        cd Backend
        # Builds the image using the Dockerfile inside the Backend folder
        docker build -t journal-backend:latest .
        echo "Tests passed and Docker image built successfully!"
